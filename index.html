<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#022B23" />
  <title>TradeScore — AI-Powered Credit for Every Trader</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'squad-deep':   '#022B23',
            'squad-green':  '#0B6E4F',
            'squad-mint':   '#1F8A65',
            'squad-leaf':   '#27AE60',
            'squad-lime':   '#E8FF8B',
            'squad-cream':  '#F5F5F0',
            'squad-pale':   '#E8F4EE',
            'squad-paper':  '#FAFAF6',
            'ink-1':        '#0A1F1A',
            'ink-2':        '#4A5C56',
            'ink-3':        '#9AA8A2',
            'line':         '#E2E8E4',
          },
          fontFamily: {
            display: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
            sans:    ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-squad-paper">
  <div id="loading">
    <div class="loader-mark"><i class="bi bi-shop"></i></div>
    <span>TradeScore</span>
    <p>Loading your credit dashboard…</p>
  </div>

  <div id="app"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
